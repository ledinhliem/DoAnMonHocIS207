<!DOCTYPE html>

<html class="light" lang="vn">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Forgot Password - Evergreen</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500;600&amp;display=swap"
        rel="stylesheet" />
    <!-- Icons -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    //  Bảng màu chung
                    colors: {
                        "tertiary": "#474845",
                        "on-surface-variant": "#44483e",
                        "secondary": "#775839",
                        "surface": "#f9faf2",
                        "tertiary-container": "#5e605c",
                        "surface-bright": "#f9faf2",
                        "outline-variant": "#c5c8ba",
                        "on-error": "#ffffff",
                        "surface-container-high": "#e7e9e1",
                        "on-primary-fixed": "#0f2000",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#374d20",
                        "inverse-primary": "#b5cf95",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#c6c7c2",
                        "secondary-fixed-dim": "#e8bf98",
                        "primary-fixed-dim": "#b5cf95",
                        "primary-fixed": "#d0ecaf",
                        "on-primary-container": "#c7e3a7",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#5d4123",
                        "on-error-container": "#93000a",
                        "on-primary": "#ffffff",
                        "background": "#f9faf2",
                        "surface-tint": "#4e6535",
                        "surface-variant": "#e1e3dc",
                        "primary-container": "#4f6636",
                        "outline": "#75796d",
                        "surface-dim": "#d9dbd3",
                        "on-secondary-fixed": "#2c1701",
                        "on-background": "#191c18",
                        "inverse-on-surface": "#f0f1ea",
                        "surface-container-highest": "#e1e3dc",
                        "surface-container-low": "#f3f4ed",
                        "inverse-surface": "#2e312c",
                        "on-surface": "#191c18",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#454744",
                        "surface-container": "#edefe7",
                        "on-tertiary-container": "#dadad6",
                        "on-tertiary-fixed": "#1a1c19",
                        "tertiary-fixed": "#e3e3de",
                        "primary": "#384e21",
                        "on-secondary-container": "#7a5b3b",
                        "secondary-container": "#ffd5ae",
                        "secondary-fixed": "#ffdcbd"
                    },
                    // Phông chữ
                    fontFamily: {
                        "headline": ["Epilogue"],
                        "body": ["Be Vietnam Pro"],
                        "label": ["Be Vietnam Pro"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }

        .glass-nav {
            backdrop-filter: blur(12px);
            background-color: rgba(249, 250, 242, 0.8);
        }

        .hero-gradient {
            background: linear-gradient(to right, #384e21, #4f6636);
        }
    </style>
</head>
<!-- Định dạng background,hiển thị chung -->
<body class="min-h-screen flex flex-col selection:bg-primary-fixed selection:text-primary">
    <!-- Thanh header logo -->
    <header class="w-full top-0 bg-[#f9faf2] dark:bg-[#191c18] flex justify-between items-center px-6 py-4 z-50">
        <!-- Logo -->
        <div class="flex items-center gap-4">
            <span class="text-[#384e21] dark:text-[#b5cf95] font-['Epilogue'] font-black text-xl">Zentro</span>
        </div>
        <div class="flex items-center gap-4">
            <button
                class="p-2 rounded-full hover:bg-[#e1e3dc]/50 transition-colors active:scale-95 duration-150 text-[#384e21]">
                <span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
            </button>
        </div>
    </header>
    <main class="flex-grow flex items-center justify-center px-6 py-20 relative overflow-hidden">
        <!-- Trang trí cho đẹp :))) -->
        <div
            class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-fixed-dim/20 rounded-full blur-[120px] pointer-events-none">
        </div>
        <div
            class="absolute bottom-[-10%] right-[-10%] w-[35%] h-[35%] bg-secondary-container/30 rounded-full blur-[100px] pointer-events-none">
        </div>

        <div class="w-full max-w-md relative z-10">
            <div class="mb-12 text-center">
                <!-- Icon để đại -->
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container mb-8">
                    <span class="material-symbols-outlined text-primary text-3xl"
                        data-icon="potted_plant">potted_plant</span>
                </div>
                <!-- Tiêu đề + nội dung -->
                <h1 class="text-4xl font-extrabold text-primary tracking-tight mb-4">Reset Password</h1>
                <p class="text-on-surface-variant leading-relaxed">Enter the email associated with your Evergreen
                    account and we'll send a recovery link to restore access.</p>
            </div>
            <!-- Form reset password -->
            <div class="bg-surface-container-low rounded-[2rem] p-10 shadow-sm border border-outline-variant/10">
                <form class="space-y-8">
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-on-surface ml-1" for="email">Email
                            Address</label>
                        <div class="relative group">
                            <input
                                class="w-full px-5 py-4 bg-surface-container-high rounded-xl border-none text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary/30 focus:bg-surface-container-lowest transition-all duration-300 outline-none"
                                id="email" name="email" placeholder="name@example.com" required="" type="email" />
                            <span
                                class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors"
                                data-icon="mail">mail</span>
                        </div>
                    </div>
                    <!-- Điều hường nhận mail -->
                    <button
                        class="w-full py-4 px-6 bg-primary text-on-primary font-semibold rounded-xl hover:shadow-lg hover:shadow-primary/20 transition-all duration-300 flex items-center justify-center gap-3 active:scale-[0.98]"
                        type="submit">
                        <span>Send Recovery Link</span>
                        <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
                    </button>
                </form>
                <!-- Điều hướng quay về trang đăng ký -->
                <div class="mt-10 pt-8 border-t border-outline-variant/30 flex flex-col items-center gap-4">
                    <a class="group flex items-center gap-2 text-sm font-medium text-on-surface-variant hover:text-primary transition-colors"
                        href="#">
                        <span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform"
                            data-icon="chevron_left">chevron_left</span>
                        Back to login
                    </a>
                </div>
            </div>
            <!-- Nhãn cam kết bảo mật -->
            <div class="mt-12 text-center">
                <div
                    class="inline-flex items-center gap-2 px-4 py-2 bg-surface-container rounded-full border border-outline-variant/10">
                    <span class="w-2 h-2 rounded-full bg-primary-fixed-dim"></span>
                    <span class="text-xs font-medium text-on-surface-variant tracking-wider uppercase">Conscious
                        Security</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Cái hình cố định ở cuối trang -->
    <div class="fixed bottom-0 left-0 w-full h-48 -z-20 opacity-20 pointer-events-none">
        <img class="w-full h-full object-cover"
            data-alt="close-up of smoothed natural grey river stone texture with gentle lighting and soft shadows"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPnWAociNieVlxiRuRMr0OaGgXkuxiC_JksDaiFam77hYuE58MST_Cjht8R1pZ1NXGLXt53qrxTb9oYwAO_nx_OM9CCvb1FZJQJrLvua1CMyPmsvkcF37cx7dakZw-SB-mB5DN38TB2fjvrPD6U5Q1648v23AmzoalVP3aP93hN5MG-1c6wXOq39KyiPDHh4jpdv-5JME2uJhA99qBTzvWbMoHLKiQ1_4sq9EPsNs2UcKnvaQ5VPajMkiEwHJPTMbcHJLvtvAs8JM" />
    </div>
    <!-- Footer rút gọn -->
    <footer class="w-full py-12 px-8 mt-auto bg-surface-container-low">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
            <div class="space-y-2">
                <!-- Logo -->
                <span class="font-headline font-bold text-primary text-lg">Zentro</span>
                <p class="font-body text-sm text-stone-500">© 2024 Zentro Sustainable Goods. Built for the planet.</p>
            </div>
            <div class="flex flex-wrap gap-x-8 gap-y-4 md:justify-end">
                <a class="font-body text-sm text-stone-500 hover:text-primary transition-colors duration-200"
                    href="#">Privacy Policy</a>
                <a class="font-body text-sm text-stone-500 hover:text-primary transition-colors duration-200"
                    href="#">Terms of Service</a>
                <a class="font-body text-sm text-stone-500 hover:text-primary transition-colors duration-200"
                    href="#">Contact</a>
            </div>
        </div>
    </footer>
</body>

</html>
